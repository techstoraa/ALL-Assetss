<script type="text/javascript">
/**
 * TECHSTORA WALLET CORE V5 (SYNCED WITH EXPIRY)
 */

const WORKER_BASE = 'https://www.techstora.com';
const ADMIN_UID = "2";
const REFRESH_COOLDOWN = 30;

let current_uid = null;
let cooldownActive = false;

function tsLog(message) {
    if (current_uid !== ADMIN_UID) return;
    const consoleBox = document.getElementById('ts-debug-console');
    const logArea = document.getElementById('ts-debug-log');
    consoleBox.style.display = 'block';
    logArea.innerHTML += `\n[${new Date().toLocaleTimeString()}] ${message}`;
}

function getUID() {
    try {
        const win = window.parent || window;
        const scripts = win.document.getElementsByTagName('script');
        for (let s of scripts) {
            const t = s.innerHTML || s.textContent;
            if (t && t.includes('__session_info__') && t.includes('"uid"')) {
                const match = t.match(/"uid"\s*:\s*(\d+)/);
                if (match && match[1]) {
                    current_uid = match[1];
                    return match[1];
                }
            }
        }
    } catch (e) { console.error("Identity extraction failed."); }
    return null;
}

function updateUI(data, uid) {
    tsLog("Injecting live server data...");
    
    const total = data.total_tokens !== undefined ? data.total_tokens : "---";
    const remaining = data.remaining_tokens !== undefined ? data.remaining_tokens : "---";
    const used = (typeof total === 'number' && typeof remaining === 'number') ? (total - remaining) : "---";
    const plan = data.plan_name || 'Free Tier';
    const expiry = data.plan_expiry; // Accessing backend expiry field

    document.getElementById('ts-display-uid').innerText = `UID: ${uid || 'Unsigned'}`;
    document.getElementById('ts-avatar-id').innerText = uid ? uid.toString().substring(0, 2).toUpperCase() : 'TS';
    document.getElementById('w-plan').innerText = plan;

    // Show Expiry if available
    const expiryNode = document.getElementById('w-expiry');
    if (expiry) {
        const expiryDate = new Date(expiry).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
        expiryNode.innerText = `Expires: ${expiryDate}`;
    } else {
        expiryNode.innerText = plan === 'Free Tier' ? 'Life-time (One-off)' : '';
    }

    document.getElementById('w-total').innerText = total;
    document.getElementById('w-used').innerText = used;

    let pct = 0;
    if (typeof total === 'number' && total > 0) {
        pct = Math.round((used / total) * 100);
    }
    
    document.getElementById('w-percent').innerText = `${pct}%`;
    const fill = document.getElementById('w-progress-fill');
    fill.style.width = `${pct}%`;
    fill.style.background = pct > 85 ? 'linear-gradient(90deg, #ef4444, #f59e0b)' : 'linear-gradient(90deg, var(--ts-accent-cyan), var(--ts-accent-purple))';
}

function startCooldown() {
    cooldownActive = true;
    const btn = document.getElementById('refresh-btn');
    let timeLeft = REFRESH_COOLDOWN;
    btn.disabled = true;
    const timer = setInterval(() => {
        timeLeft--;
        btn.innerText = `Sync Available in ${timeLeft}s`;
        if (timeLeft <= 0) {
            clearInterval(timer);
            btn.disabled = false;
            btn.innerText = 'Force Sync Balance';
            cooldownActive = false;
        }
    }, 1000);
}

async function refreshWallet(isAuto = false) {
    const uid = getUID();
    const status = document.getElementById('status-msg');
    if (!uid) return;
    if (!isAuto && cooldownActive) return;
    if (!isAuto) startCooldown();
    
    try {
        const res = await fetch(`${WORKER_BASE}/api/v1/wallet/status?uid=${uid}`, { credentials: 'include' });
        const result = await res.json();
        if (result.success) updateUI(result, uid);
    } catch (e) {
        tsLog(`Fatal Fetch Error: ${e.message}`);
    }
}

async function startPayment(planKey) {
    const uid = getUID();
    if (!uid) return;
    try {
        const res = await fetch(`${WORKER_BASE}/api/v1/payment/create-order`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uid: uid, plan_key: planKey })
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error);
        if (window.Cashfree) {
            const cf = Cashfree({ mode: 'production' });
            cf.checkout({ paymentSessionId: data.payment_session_id, redirectTarget: '_self' });
        }
    } catch (e) { tsLog(`Payment Stack Error: ${e.message}`); }
}

(function() {
    getUID();
    refreshWallet(true);
})();
</script>
