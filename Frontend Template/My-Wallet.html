<style>
    :root {
        --ts-bg-main: #0a0e27;
        --ts-card-bg: rgba(255, 255, 255, 0.03);
        --ts-card-border: rgba(255, 255, 255, 0.08);
        --ts-accent-cyan: #00d9ff;
        --ts-accent-purple: #8b5cf6;
        --ts-text-primary: #f5f5f5;
        --ts-text-muted: #a1a1aa;
        --ts-gold: #ffb347;
    }
    .ts-master-wrapper { width: 100%; max-width: 480px; margin: 20px auto; font-family: 'Segoe UI', sans-serif; color: var(--ts-text-primary); box-sizing: border-box; }
    .ts-master-wrapper * { box-sizing: border-box; }
    .ts-profile-header { background: var(--ts-card-bg); border: 1px solid var(--ts-card-border); border-radius: 16px 16px 0 0; padding: 24px; display: flex; align-items: center; gap: 20px; }
    .ts-avatar-box { position: relative; width: 76px; height: 76px; border-radius: 50%; background: linear-gradient(135deg, var(--ts-accent-cyan), var(--ts-accent-purple)); padding: 3px; }
    .ts-avatar-inner { width: 100%; height: 100%; border-radius: 50%; background: #0a0e27; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; color: var(--ts-accent-cyan); }
    .ts-profile-info { display: flex; flex-direction: column; gap: 4px; }
    .ts-profile-username { font-size: 18px; font-weight: 700; color: #fff; }
    .ts-profile-badge { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--ts-gold); }
    .ts-wallet-body { background: var(--ts-card-bg); border-left: 1px solid var(--ts-card-border); border-right: 1px solid var(--ts-card-border); border-bottom: 1px solid var(--ts-card-border); border-radius: 0 0 16px 16px; padding: 24px; }
    .ts-token-matrix { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .ts-matrix-box { background: rgba(0, 0, 0, 0.3); border: 1px solid var(--ts-card-border); border-radius: 12px; padding: 16px; text-align: center; }
    .ts-matrix-box span { display: block; font-size: 11px; color: var(--ts-text-muted); text-transform: uppercase; margin-bottom: 6px; }
    .ts-matrix-value { font-size: 22px; font-weight: 800; color: #fff; }
    .ts-progress-container { margin-bottom: 24px; }
    .ts-progress-labels { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: var(--ts-text-muted); }
    .ts-progress-track { width: 100%; height: 8px; background: rgba(255, 255, 255, 0.05); border-radius: 10px; overflow: hidden; }
    .ts-progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--ts-accent-purple), #ef4444); border-radius: 10px; transition: width 0.8s; }
    .ts-plans-header { font-size: 12px; font-weight: 700; text-transform: uppercase; color: var(--ts-accent-cyan); margin-bottom: 14px; }
    .ts-plan-card { background: rgba(0, 0, 0, 0.2); border: 1px solid var(--ts-card-border); border-radius: 10px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; position: relative; }
    .ts-plan-pro { background: rgba(139, 92, 246, 0.05); border: 1px solid transparent; background-clip: padding-box; }
    .ts-plan-pro::before { content: ''; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px; border-radius: 10px; background: linear-gradient(90deg, #00d9ff, #8b5cf6, #ffb347, #00d9ff); background-size: 300% 300%; z-index: -1; animation: ts-glow 4s linear infinite; }
    @keyframes ts-glow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .ts-popular-badge { position: absolute; top: -10px; right: 16px; background: linear-gradient(135deg, #ffb347, #f59e0b); color: #000; font-size: 10px; font-weight: 800; padding: 3px 10px; border-radius: 12px; text-transform: uppercase; }
    .ts-plan-details h4 { margin: 0 0 4px 0; font-size: 15px; color: #fff; }
    .ts-plan-details p { margin: 0; font-size: 12px; color: var(--ts-text-muted); }
    .ts-buy-btn { background: var(--ts-gold); color: #000; border: none; padding: 8px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; z-index: 1; }
    .ts-buy-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .ts-refresh-action { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid var(--ts-card-border); padding: 12px; width: 100%; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    #status-msg { margin-top: 12px; font-size: 13px; color: var(--ts-text-muted); text-align: center; }
    .ts-debug-box { background: #000; border: 1px solid #ef4444; color: #10b981; font-family: monospace; font-size: 11px; padding: 12px; border-radius: 8px; margin-bottom: 20px; overflow-x: auto; white-space: pre-wrap; display: none; }
    .ts-debug-title { color: #ef4444; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; }
</style>

<div class="ts-master-wrapper">
    <div class="ts-profile-header">
        <div class="ts-avatar-box">
            <div id="ts-avatar-id" class="ts-avatar-inner">--</div>
        </div>
        <div class="ts-profile-info">
            <div id="ts-display-uid" class="ts-profile-username">UID: Fetching...</div>
            <div id="w-plan" class="ts-profile-badge">Syncing...</div>
        </div>
    </div>
    <div class="ts-wallet-body">
        <div id="ts-debug-console" class="ts-debug-box">
            <div class="ts-debug-title">Terminal Diagnostic Log</div>
            <div id="ts-debug-log">Standing by...</div>
        </div>
        <div class="ts-token-matrix">
            <div class="ts-matrix-box">
                <span>Total Tokens</span>
                <div id="w-total" class="ts-matrix-value">—</div>
            </div>
            <div class="ts-matrix-box">
                <span>Used Tokens</span>
                <div id="w-used" class="ts-matrix-value">—</div>
            </div>
        </div>
        <div class="ts-progress-container">
            <div class="ts-progress-labels">
                <span>Quota Consumption</span>
                <span id="w-percent">0%</span>
            </div>
            <div class="ts-progress-track">
                <div id="w-progress-fill" class="ts-progress-fill"></div>
            </div>
        </div>
        <div class="ts-plans-header">Upgrade Infrastructure</div>
        <div class="ts-plan-card">
            <div class="ts-plan-details">
                <h4>Lite Plan</h4>
                <p>~1,230 Tokens (₹99 / 30 Days)</p>
            </div>
            <button class="ts-buy-btn" onclick="startPayment('lite')">Upgrade</button>
        </div>
        <div class="ts-plan-card ts-plan-pro">
            <div class="ts-popular-badge">Most Popular</div>
            <div class="ts-plan-details">
                <h4>Pro Plan</h4>
                <p>~3,730 Tokens (₹299 / 30 Days)</p>
            </div>
            <button class="ts-buy-btn" onclick="startPayment('pro')">Upgrade</button>
        </div>
        <div class="ts-plan-card">
            <div class="ts-plan-details">
                <h4>Max Plan</h4>
                <p>~10,480 Tokens (₹799 / 30 Days)</p>
            </div>
            <button class="ts-buy-btn" onclick="startPayment('max')">Upgrade</button>
        </div>
        <button id="refresh-btn" class="ts-refresh-action" onclick="refreshWallet()">Force Sync Balance</button>
        <p id="status-msg"></p>
    </div>
</div>

<script type="text/javascript">
/* ====================================================================
 * DEBUG_MODE — MASTER SWITCH FOR ON-SCREEN DIAGNOSTIC LOGGING
 * ====================================================================
 * If DEBUG_MODE = false  -> The red "Terminal Diagnostic Log" box will
 *                           NEVER appear on screen, no matter what error
 *                           or event occurs. Users will only see a clean,
 *                           friendly status message (e.g. "Sync failed,
 *                           please try again."). This is the correct
 *                           setting for PRODUCTION / LIVE users.
 *
 * If DEBUG_MODE = true   -> The red diagnostic box WILL appear and will
 *                           print every technical log line (UID detection,
 *                           API URL, HTTP status, raw response, errors).
 *                           Use this ONLY temporarily while you are
 *                           actively debugging an issue. Turn it back to
 *                           false before going live again.
 * ==================================================================== */
const DEBUG_MODE = false;

const WORKER_BASE = 'https://www.techstora.com';

let cashfreeSDKPromise = null;
function loadCashfreeSDK() {
    if (window.Cashfree) return Promise.resolve();
    if (cashfreeSDKPromise) return cashfreeSDKPromise;
    cashfreeSDKPromise = new Promise((resolve, reject) => {
        const existing = document.querySelector('script[src="https://sdk.cashfree.com/js/v3/cashfree.js"]');
        if (existing) {
            existing.addEventListener('load', resolve);
            existing.addEventListener('error', reject);
            if (window.Cashfree) resolve();
            return;
        }
        const s = document.createElement('script');
        s.src = 'https://sdk.cashfree.com/js/v3/cashfree.js';
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
    });
    return cashfreeSDKPromise;
}
loadCashfreeSDK();

// tsLog only writes to the visible on-screen box when DEBUG_MODE is true.
// When DEBUG_MODE is false, it does nothing at all (no box, no leak of
// internal details to end users).
function tsLog(message) {
    if (!DEBUG_MODE) return;
    const consoleBox = document.getElementById('ts-debug-console');
    const logArea = document.getElementById('ts-debug-log');
    consoleBox.style.display = 'block';
    const time = new Date().toLocaleTimeString();
    logArea.innerHTML += `\n[${time}] ${message}`;
}

function getUID() {
    try {
        const targetWindow = window.parent || window;
        const scripts = targetWindow.document.getElementsByTagName('script');
        for (let script of scripts) {
            const text = script.innerHTML || script.textContent;
            if (text && text.includes('__session_info__') && text.includes('"uid"')) {
                const match = text.match(/"uid"\s*:\s*(\d+)/);
                if (match && match[1]) {
                    tsLog(`✅ Session detected. UID: ${match[1]}`);
                    return match[1];
                }
            }
        }
        tsLog("⚠️ Warning: No Odoo session script found in DOM.");
    } catch (e) {
        tsLog(`❌ DOM Access Error: ${e.message}`);
    }
    return null;
}

function renderWallet(data, uid) {
    tsLog(`🎨 Rendering UI with Data: ${JSON.stringify(data)}`);
    const safeData = data || { plan_name: 'Free Tier', total_tokens: 200, remaining_tokens: 200 };

    if (uid && uid !== "unknown_uid") {
        document.getElementById('ts-display-uid').innerText = `UID: ${uid}`;
        document.getElementById('ts-avatar-id').innerText = uid.substring(0, 2).toUpperCase();
    } else {
        document.getElementById('ts-display-uid').innerText = `UID: Guest`;
        document.getElementById('ts-avatar-id').innerText = `TS`;
    }

    document.getElementById('w-plan').innerText = safeData.plan_name || 'Free Tier';

    let total = safeData.total_tokens || 200;
    let remaining = safeData.remaining_tokens !== undefined ? safeData.remaining_tokens : 200;
    let used = Math.max(total - remaining, 0);

    document.getElementById('w-total').innerText = total;
    document.getElementById('w-used').innerText = used;

    let realPercent = total > 0 ? Math.round((used / total) * 100) : 0;
    let visualPercent = realPercent;
    if (realPercent > 0 && realPercent < 95) {
        visualPercent = Math.min(realPercent + 3, 98);
    }

    document.getElementById('w-percent').innerText = `${realPercent}%`;
    document.getElementById('w-progress-fill').style.width = `${visualPercent}%`;
}

async function refreshWallet() {
    tsLog("🚀 Initiating Force Sync...");
    const uid = getUID();

    if (!uid) {
        document.getElementById('status-msg').innerText = 'Authentication required.';
        tsLog("❌ Sync aborted: UID is null.");
        return;
    }

    const btn = document.getElementById('refresh-btn');
    if (btn) btn.disabled = true;
    document.getElementById('status-msg').innerText = 'Establishing secure tunnel...';

    try {
        const url = `${WORKER_BASE}/api/v1/wallet/status?uid=${uid}`;
        tsLog(`📡 Fetching API: ${url}`);

        const res = await fetch(url, { method: 'GET', credentials: 'include' });
        tsLog(`HTTP Status: ${res.status}`);

        const rawText = await res.text();
        tsLog(`📦 Raw API Response: ${rawText}`);

        const result = JSON.parse(rawText);

        if (!result.success) {
            // ✅ Fixed: user sees a clean generic message unless DEBUG_MODE is on.
            document.getElementById('status-msg').innerText = DEBUG_MODE
                ? 'Sync Error: ' + result.error
                : 'Unable to load wallet. Please try again.';
            tsLog(`❌ Backend Logic Error: ${result.error}`);
            return;
        }

        // ✅ Fixed: backend returns fields at the root level (not under .data),
        // so we pass "result" itself, not "result.data".
        renderWallet(result, uid);
        document.getElementById('status-msg').innerText = 'Synced successfully.';
    } catch (err) {
        document.getElementById('status-msg').innerText = DEBUG_MODE
            ? 'Network telemetry failed.'
            : 'Something went wrong. Please try again.';
        tsLog(`💥 CRITICAL FETCH ERROR: ${err.message}`);
    } finally {
        if (btn) btn.disabled = false;
    }
}

async function startPayment(planKey) {
    const uid = getUID();
    if (!uid) {
        document.getElementById('status-msg').innerText = 'Please log in to purchase.';
        return;
    }
    document.getElementById('status-msg').innerText = 'Initializing Payment Gateway...';
    tsLog(`💳 Initiating Payment for Plan: ${planKey}`);

    try {
        const res = await fetch(`${WORKER_BASE}/api/v1/payment/create-order`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uid: uid, plan_key: planKey })
        });

        const rawText = await res.text();
        tsLog(`📦 Payment API Response: ${rawText}`);
        const data = JSON.parse(rawText);

        if (!data.success) {
            document.getElementById('status-msg').innerText = DEBUG_MODE
                ? 'Order Error: ' + data.error
                : 'Unable to start payment. Please try again.';
            return;
        }

        tsLog('⏳ Waiting for Cashfree SDK...');
        await loadCashfreeSDK();

        const cashfree = Cashfree({ mode: 'production' });
        cashfree.checkout({
            paymentSessionId: data.payment_session_id,
            redirectTarget: '_self'
        });
    } catch (err) {
        document.getElementById('status-msg').innerText = DEBUG_MODE
            ? 'Transaction instance failed.'
            : 'Payment could not be started. Please try again.';
        tsLog(`💥 PAYMENT ERROR: ${err.message}`);
    }
}

(function() {
    tsLog("⚡ HydraJS Engine Booting...");
    refreshWallet();
})();
</script>
