<style>
  /* Core Theme Variables */
  :root {
      --ts-bg-main: #0a0e27;
      --ts-card-bg: rgba(255, 255, 255, 0.03);
      --ts-card-border: rgba(255, 255, 255, 0.08);
      --ts-card-hover-border: rgba(0, 217, 255, 0.4);
      --ts-accent-cyan: #00d9ff;
      --ts-accent-purple: #8b5cf6;
      --ts-text-primary: #f5f5f5;
      --ts-text-muted: #a1a1aa;
      --ts-error-bg: rgba(220, 38, 38, 0.1);
      --ts-error-border: rgba(220, 38, 38, 0.3);
      --ts-error-text: #f87171;
  }

  .ts-master-wrapper {
      width: 100vw;
      position: relative;
      left: 50%;
      right: 50%;
      margin-left: -50vw;
      margin-right: -50vw;
      background: var(--ts-bg-main);
      color: var(--ts-text-primary);
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
      box-sizing: border-box;
      line-height: 1.6;
      padding-bottom: 4rem;
  }

  .ts-master-wrapper * { box-sizing: border-box; }

  .ts-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
  }

  /* Hero Section */
  .ts-hero {
      text-align: center;
      padding: 3rem 1.5rem 2rem 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      background: radial-gradient(circle at top, rgba(139, 92, 246, 0.1) 0%, transparent 60%);
  }
  .ts-hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      margin: 0 0 0.8rem 0;
      color: #fff;
      font-weight: 700;
  }
  .ts-hero p {
      font-size: 1.05rem;
      color: var(--ts-text-muted);
      max-width: 680px;
      margin: 0 auto;
  }

  /* Input Controller */
  .ts-input-module {
      background: var(--ts-card-bg);
      border: 1px solid var(--ts-card-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  .ts-input-row {
      display: flex;
      flex-direction: column;
      gap: 12px;
  }
  @media (min-width: 768px) {
      .ts-input-row { flex-direction: row; align-items: stretch; }
  }

  .ts-input {
      flex: 1;
      padding: 16px 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      font-size: 15px;
      background: rgba(0, 0, 0, 0.4);
      color: var(--ts-text-primary);
      outline: none;
      transition: all 0.3s ease;
      width: 100%;
  }
  .ts-input:focus { border-color: var(--ts-accent-cyan); box-shadow: 0 0 0 3px rgba(0, 217, 255, 0.15); }

  .ts-btn {
      padding: 16px 32px;
      background: linear-gradient(135deg, var(--ts-accent-cyan), var(--ts-accent-purple));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease;
      white-space: nowrap;
  }
  .ts-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .ts-btn:hover:not(:disabled) { transform: translateY(-2px); opacity: 0.9; }

  /* Dynamic Outputs */
  .ts-output { margin-top: 1.5rem; }

  /* Loading State */
  .ts-loading-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 2rem;
      font-size: 15px;
      color: var(--ts-accent-cyan);
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      border: 1px dashed rgba(0,217,255,0.3);
  }
  .ts-spinner {
      width: 24px; height: 24px;
      border: 3px solid rgba(0,217,255,0.2);
      border-top-color: var(--ts-accent-cyan);
      border-radius: 50%;
      animation: ts-spin 0.8s linear infinite;
  }
  @keyframes ts-spin { to { transform: rotate(360deg); } }

  /* Alert States */
  .ts-alert { padding: 16px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; display: block; margin-bottom: 1rem; }
  .ts-alert-err { background: var(--ts-error-bg); color: var(--ts-error-text); border: 1px solid var(--ts-error-border); }
  .ts-alert-warn { background: rgba(234,179,8,0.1); color: #facc15; border: 1px solid rgba(234,179,8,0.3); }

  /* Sequential Data Cards */
  .ts-workspace { display: flex; flex-direction: column; gap: 1.5rem; }

  .ts-card {
      background: var(--ts-card-bg);
      border: 1px solid var(--ts-card-border);
      border-radius: 12px;
      padding: 1.5rem;
      width: 100%;
  }

  .ts-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
  }
  .ts-card-title {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--ts-accent-purple);
      letter-spacing: 1.5px;
      margin: 0;
  }

  /* Utility Copy Button */
  .ts-btn-copy {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--ts-accent-cyan);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
  }
  .ts-btn-copy:hover { background: var(--ts-accent-cyan); color: #0a0e27; }

  /* Card Contents */
  .ts-embed-container {
      width: 100%; aspect-ratio: 16 / 9;
      border-radius: 8px; overflow: hidden;
      background: #000; border: 1px solid rgba(255, 255, 255, 0.1);
  }
  .ts-embed-container iframe { width: 100%; height: 100%; border: none; }

  .ts-meta-title { font-size: 1.3rem; font-weight: 700; line-height: 1.4; color: #fff; margin-bottom: 0.4rem; }
  .ts-meta-channel { font-size: 1rem; font-weight: 600; color: var(--ts-accent-cyan); }

  .ts-desc-box {
      font-size: 0.95rem; line-height: 1.6; color: var(--ts-text-muted);
      white-space: pre-wrap; max-height: 250px; overflow-y: auto;
      background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
  }
  .ts-desc-box::-webkit-scrollbar { width: 6px; }
  .ts-desc-box::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
  .ts-desc-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

  .ts-stats-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;
  }
  @media (min-width: 640px) { .ts-stats-grid { grid-template-columns: repeat(3, 1fr); } }

  .ts-stat-block {
      background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 8px; padding: 1rem; text-align: center;
  }
  .ts-stat-val { font-size: 1.4rem; font-weight: 800; color: #fff; display: block; margin-bottom: 0.2rem; }
  .ts-stat-lbl { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--ts-text-muted); letter-spacing: 1px; }

  .ts-tag-cluster { display: flex; flex-wrap: wrap; gap: 8px; }
  .ts-tag-node {
      font-size: 0.85rem; font-weight: 600; padding: 6px 14px;
      background: rgba(139, 92, 246, 0.15); border: 1px solid rgba(139, 92, 246, 0.3);
      color: #c084fc; border-radius: 20px; word-break: break-word;
  }
  .ts-login-link { display: inline-block; margin-top: 10px; padding: 8px 20px; background: var(--ts-accent-cyan); color: #0a0e27; border-radius: 7px; font-size: 13px; font-weight: 700; text-decoration: none; }
  .ts-diag-pre { font-family: 'Fira Mono', monospace; font-size: 12px; white-space: pre-wrap; word-break: break-all; color: var(--ts-error-text); margin: 0; max-height: 340px; overflow-y: auto; }
</style>

<div class="ts-master-wrapper">
  <div class="ts-hero">
      <h1>Video <span style="color: #00d9ff;">Analysis</span></h1>
      <p>Extract core metadata, tags, and metrics securely mapped directly from any YouTube node.</p>
  </div>

  <div class="ts-container">
    <div class="ts-input-module">
      <div class="ts-input-row">
        <input type="url" id="vmt-url" class="ts-input" placeholder="https://www.youtube.com/watch?v=..." spellcheck="false" autocomplete="off" />
        <button id="vmt-btn" class="ts-btn" onclick="vmtRun()">Extract Node</button>
      </div>
    </div>

    <div id="vmt-out" class="ts-output"></div>
  </div>
</div>

<script>
/* Global Copy Functions for Inline Execution */
window.tsCopyTextData = function(btn, targetId) {
    const txt = document.getElementById(targetId).innerText;
    navigator.clipboard.writeText(txt).then(() => {
        const og = btn.innerText;
        btn.innerText = 'Copied!';
        setTimeout(() => btn.innerText = og, 1500);
    });
};

(function() {
  const DEBUG_MODE = false;
  const API_ENDPOINT = 'https://www.techstora.com/api/v1/youtube/proxy';

  function getUID() {
    try {
      const scripts = document.getElementsByTagName('script');
      for (let s of scripts) {
        const t = s.innerHTML || s.textContent || '';
        if (t.includes('__session_info__') && t.includes('"uid"')) {
          const m = t.match(/"uid"\s*:\s*(\d+)/);
          if (m && m[1]) return m[1];
        }
      }
    } catch(e) {}
    return 'unknown_uid';
  }

  function fmtNum(n) {
    if (n == null) return '—';
    const x = Number(n);
    if (x >= 1e9) return (x / 1e9).toFixed(1) + 'B';
    if (x >= 1e6) return (x / 1e6).toFixed(1) + 'M';
    if (x >= 1e3) return (x / 1e3).toFixed(1) + 'K';
    return x.toLocaleString();
  }

  function extractYouTubeId(url) {
    const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
    return (match && match[1]) ? match[1] : null;
  }

  function setOut(html) {
    document.getElementById('vmt-out').innerHTML = html;
  }

  function setBtn(loading) {
    const b = document.getElementById('vmt-btn');
    b.disabled = loading;
    b.textContent = loading ? 'Extracting...' : 'Extract Node';
  }

  window.vmtRun = async function() {
    const url = document.getElementById('vmt-url').value.trim();
    const vidId = extractYouTubeId(url);

    if (!vidId) {
      setOut(`<div class="ts-alert ts-alert-err"><strong>Validation Error:</strong> Enter a valid YouTube video URL format.</div>`);
      return;
    }

    setBtn(true);
    setOut(`<div class="ts-loading-row"><div class="ts-spinner"></div><span>Querying API Pipeline...</span></div>`);

    const payload = { tool_type: 'video_meta_tags', target_url: url, uid: getUID() };

    try {
      const res = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(payload)
      });
      const raw = await res.text();

      if (!res.ok) {
        if (res.status === 429) {
          let msg = 'Usage limit reached.';
          try { msg = JSON.parse(raw).error || msg; } catch(e) {}
          setBtn(false);
          setOut(`<div class="ts-alert ts-alert-warn">🛑 ${msg}</div><a class="ts-login-link" href="/web/login">Log in to extend operations</a>`);
          return;
        }
        if (res.status === 401) {
          setBtn(false);
          setOut(`<div class="ts-alert ts-alert-warn">Authorization required to access pipeline.</div><a class="ts-login-link" href="/web/login">Log In</a>`);
          return;
        }
        throw new Error(`HTTP_${res.status} | ${raw.substring(0, 800)}`);
      }

      let data;
      try { data = JSON.parse(raw); } catch(e) { throw new Error(`JSON_PARSE_FAILED | ${raw.substring(0, 800)}`); }

      const json = data.youtube_raw_json;
      if (!json || !json.items || json.items.length === 0) {
        setBtn(false);
        setOut(`<div class="ts-alert ts-alert-err"><strong>Target Offline:</strong> Video not found or restrictions applied by creator.</div>`);
        return;
      }

      const item = json.items[0];
      const sn = item.snippet || {};
      const st = item.statistics || {};
      const tags = sn.tags || [];

      // Build Tags HTML
      const tagsHtml = tags.length
        ? `<div class="ts-tag-cluster">${tags.map(t => `<span class="ts-tag-node">${t}</span>`).join('')}</div>`
        : `<span style="font-size: 0.9rem; color: rgba(255,255,255,0.4); font-style: italic;">[NO_TAGS_DETECTED]</span>`;

      // Main UI Injection
      setBtn(false);
      setOut(`
        <div class="ts-workspace">
          
          <div class="ts-card">
              <div class="ts-card-header">
                  <div class="ts-card-title">Node Verification Trap</div>
              </div>
              <div class="ts-embed-container">
                  <iframe src="https://www.youtube.com/embed/${vidId}?rel=0" allowfullscreen></iframe>
              </div>
          </div>

          <div class="ts-card">
              <div class="ts-card-header">
                  <div class="ts-card-title">Target Identity Context</div>
                  <button class="ts-btn-copy" onclick="tsCopyTextData(this, 'ts-val-title')">Copy Title</button>
              </div>
              <div id="ts-val-title" class="ts-meta-title">${sn.title || '—'}</div>
              <div class="ts-meta-channel">${sn.channelTitle || '—'}</div>
          </div>

          <div class="ts-card">
              <div class="ts-card-header">
                  <div class="ts-card-title">Content Matrix</div>
                  <button class="ts-btn-copy" onclick="tsCopyTextData(this, 'ts-val-desc')">Copy Desc</button>
              </div>
              <div id="ts-val-desc" class="ts-desc-box">${sn.description || 'No descriptive data mapped.'}</div>
          </div>

          <div class="ts-card">
              <div class="ts-card-header">
                  <div class="ts-card-title">Performance Telemetry</div>
              </div>
              <div class="ts-stats-grid">
                  <div class="ts-stat-block">
                      <span class="ts-stat-val">${fmtNum(st.viewCount)}</span>
                      <span class="ts-stat-lbl">Views</span>
                  </div>
                  <div class="ts-stat-block">
                      <span class="ts-stat-val">${fmtNum(st.likeCount)}</span>
                      <span class="ts-stat-lbl">Likes</span>
                  </div>
                  <div class="ts-stat-block">
                      <span class="ts-stat-val">${fmtNum(st.commentCount)}</span>
                      <span class="ts-stat-lbl">Comments</span>
                  </div>
              </div>
          </div>

          <div class="ts-card">
              <div class="ts-card-header">
                  <div class="ts-card-title">Optimization Vectors</div>
                  <button class="ts-btn-copy" onclick="tsCopyTextData(this, 'ts-val-tags-raw')">Copy All Tags</button>
              </div>
              <div id="ts-val-tags-raw" style="display:none;">${tags.join(', ')}</div>
              ${tagsHtml}
          </div>

        </div>
      `);

    } catch(err) {
      setBtn(false);
      if (DEBUG_MODE) {
        const dump = JSON.stringify(err, Object.getOwnPropertyNames(err), 2);
        setOut(`<div class="ts-alert ts-alert-err"><strong>RAW FAULT:</strong><hr style="border-color:rgba(200,0,0,0.2);margin:8px 0;"><pre class="ts-diag-pre">${dump}</pre></div>`);
      } else {
        setOut(`<div class="ts-alert ts-alert-err">Pipeline compromised. Check server stability and try again.</div>`);
      }
    }
  };
})();
    </script>
