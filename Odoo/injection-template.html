<!-- 
  TechStora HydraJS Core Engine v1.0.9 (Zero-Cache Live Development Build)
  Architecture Pattern: Headless DOM Ingestion Engine
  Purpose: Real-time Hybridization via Bypassing CDN Edge Buffer
-->
<div id="ts-workspace-root"></div>

<script type="text/javascript">
/**
 * TechStora Headless DOM Ingestion Engine (Live CDN Mode)
 * Bypasses persistent caching layers securely using jsDelivr's absolute root.
 */
(async function() {
    // Dynamic CDN Target pointing directly to the live GitHub repository commit thread
    const targetUrl = 'https://cdn.jsdelivr.net/gh/techstoraa/ALL-Assetss@main/Frontend%20Template/Home/TechStora.html';
    
    try {
        // Fetching remote asset via CDN proxy to ensure correct HTML MIME-type execution
        const response = await fetch(targetUrl, { cache: 'no-store' });
        if (!response.ok) return;
        const rawHtml = await response.text();

        // Initializing browser DOM parser to isolate application pillars
        const parser = new DOMParser();
        const doc = parser.parseFromString(rawHtml, 'text/html');

        // Extracting and injecting scoped CSS assets into document head
        const styles = doc.querySelectorAll('style');
        styles.forEach(st => document.head.appendChild(st.cloneNode(true)));

        // Extracting the core UI wrapper and mounting it to workspace root
        const bodyContent = doc.querySelector('.ts-master-wrapper');
        if (bodyContent) {
            document.getElementById('ts-workspace-root').appendChild(bodyContent.cloneNode(true));
        }

        // Isolating javascript logic, safely sanitizing window scopes, and executing script context
        const inlineScript = doc.querySelector('script');
        if (inlineScript) {
            const cleanJS = inlineScript.textContent.replace(/window\.parent\.document/g, 'window.document');
            const executionThread = document.createElement('script');
            executionThread.type = 'text/javascript';
            executionThread.textContent = cleanJS;
            document.body.appendChild(executionThread);
        }
    } catch (err) {
        console.error("TechStora Core Runtime Hybridization Failed:", err);
    }
})();
</script>
